<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Pointless Site</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden
      }

      canvas {
        display: block
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
      camera.position.z = 400;
      const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('c'),
        antialias: false
      });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(1);
      let t = 0;
      const geometry = new THREE.SphereGeometry(120, 64, 64);
      const material = new THREE.MeshBasicMaterial({
        color: 0xffff00,
        wireframe: false
      });
      const ball = new THREE.Mesh(geometry, material);
      scene.add(ball);
      let vx = 3.5,
        vy = 2.8,
        vz = 2.2;
      let posX = 0,
        posY = 0,
        posZ = 0;

      function resize() {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      }

      function animate() {
        requestAnimationFrame(animate);
        const fx = Math.sin(5 * t) - 2 * Math.sin(t);
        const scaleX = 0.1 + fx * 0.3;
        const scaleY = 0.1 - fx * 0.3;
        const scaleZ = 0.1 + fx * 0.3;
        ball.scale.set(scaleX, scaleY, scaleZ);
        const p = Math.sin(t * 5);
        if (p > 0) {
          ball.material.color.setRGB(1, 0.95, 0.1);
        } else {
          ball.material.color.setRGB(1, 0.2, 0.8);
        }
        const margin = 180;
        const limitX = 300 - margin;
        const limitY = 220 - margin;
        const limitZ = 150;
        posX += vx;
        posY += vy;
        posZ += vz;
        if (Math.abs(posX) > limitX) {
          vx = -vx * 0.82;
          posX = Math.sign(posX) * limitX;
        }
        if (Math.abs(posY) > limitY) {
          vy = -vy * 0.82;
          posY = Math.sign(posY) * limitY;
        }
        if (Math.abs(posZ) > limitZ) {
          vz = -vz * 0.82;
          posZ = Math.sign(posZ) * limitZ;
        }
        ball.position.set(posX, posY, posZ);
        ball.rotation.y += 0.09;
        ball.rotation.x += 0.005;
        t += 0.048;
        renderer.render(scene, camera);
      }
      resize();
      animate();
      let audioCtx, oscillator, gainNode;

      function startAudio() {
        if (audioCtx) return;
        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        gainNode.gain.value = 0.38;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        setInterval(() => {
          if (!oscillator) return;
          const fx = Math.sin(5 * t) - 2 * Math.sin(t);
          let freq = 110 + 580 * fx;
          oscillator.frequency.setValueAtTime(Math.max(55, freq), audioCtx.currentTime);
        }, 16);
      }
      setTimeout(startAudio, 100);
    </script>
  </body>
</html>
