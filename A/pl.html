<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointless Site</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script>
(() => {
  const canvas = document.getElementById('scene');
  const gl = canvas.getContext('webgl', {
    antialias: true,
    alpha: false,
    depth: true,
    stencil: false,
    premultipliedAlpha: false,
    preserveDrawingBuffer: false
  });

  if (!gl) {
    document.body.innerHTML = '';
    document.body.style.background = '#000';
    return;
  }

  const vertexSource = `
    attribute vec3 aPosition;
    uniform mat4 uProjection;
    uniform mat4 uView;
    uniform mat4 uModel;
    void main() {
      gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    }
  `;

  const fragmentSource = `
    precision mediump float;
    uniform vec3 uColor;
    void main() {
      gl_FragColor = vec4(uColor, 1.0);
    }
  `;

  function compile(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(shader) || 'shader compile failed');
    }
    return shader;
  }

  function createProgram(vs, fs) {
    const program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, vs));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program) || 'program link failed');
    }
    return program;
  }

  function createMat4() {
    return new Float32Array(16);
  }

  function mat4Identity(out) {
    out[0] = 1; out[1] = 0; out[2] = 0; out[3] = 0;
    out[4] = 0; out[5] = 1; out[6] = 0; out[7] = 0;
    out[8] = 0; out[9] = 0; out[10] = 1; out[11] = 0;
    out[12] = 0; out[13] = 0; out[14] = 0; out[15] = 1;
    return out;
  }

  function mat4Perspective(out, fovy, aspect, near, far) {
    const f = 1 / Math.tan(fovy / 2);
    const nf = 1 / (near - far);
    out[0] = f / aspect;
    out[1] = 0;
    out[2] = 0;
    out[3] = 0;
    out[4] = 0;
    out[5] = f;
    out[6] = 0;
    out[7] = 0;
    out[8] = 0;
    out[9] = 0;
    out[10] = (far + near) * nf;
    out[11] = -1;
    out[12] = 0;
    out[13] = 0;
    out[14] = (2 * far * near) * nf;
    out[15] = 0;
    return out;
  }

  function mat4LookAt(out, eye, center, up) {
    let x0, x1, x2, y0, y1, y2, z0, z1, z2, len;
    z0 = eye[0] - center[0];
    z1 = eye[1] - center[1];
    z2 = eye[2] - center[2];
    len = Math.hypot(z0, z1, z2) || 1;
    z0 /= len; z1 /= len; z2 /= len;
    x0 = up[1] * z2 - up[2] * z1;
    x1 = up[2] * z0 - up[0] * z2;
    x2 = up[0] * z1 - up[1] * z0;
    len = Math.hypot(x0, x1, x2) || 1;
    x0 /= len; x1 /= len; x2 /= len;
    y0 = z1 * x2 - z2 * x1;
    y1 = z2 * x0 - z0 * x2;
    y2 = z0 * x1 - z1 * x0;
    out[0] = x0; out[1] = y0; out[2] = z0; out[3] = 0;
    out[4] = x1; out[5] = y1; out[6] = z1; out[7] = 0;
    out[8] = x2; out[9] = y2; out[10] = z2; out[11] = 0;
    out[12] = -(x0 * eye[0] + x1 * eye[1] + x2 * eye[2]);
    out[13] = -(y0 * eye[0] + y1 * eye[1] + y2 * eye[2]);
    out[14] = -(z0 * eye[0] + z1 * eye[1] + z2 * eye[2]);
    out[15] = 1;
    return out;
  }

  function mat4Multiply(out, a, b) {
    const a00 = a[0], a01 = a[1], a02 = a[2], a03 = a[3];
    const a10 = a[4], a11 = a[5], a12 = a[6], a13 = a[7];
    const a20 = a[8], a21 = a[9], a22 = a[10], a23 = a[11];
    const a30 = a[12], a31 = a[13], a32 = a[14], a33 = a[15];
    const b00 = b[0], b01 = b[1], b02 = b[2], b03 = b[3];
    const b10 = b[4], b11 = b[5], b12 = b[6], b13 = b[7];
    const b20 = b[8], b21 = b[9], b22 = b[10], b23 = b[11];
    const b30 = b[12], b31 = b[13], b32 = b[14], b33 = b[15];
    out[0] = a00 * b00 + a10 * b01 + a20 * b02 + a30 * b03;
    out[1] = a01 * b00 + a11 * b01 + a21 * b02 + a31 * b03;
    out[2] = a02 * b00 + a12 * b01 + a22 * b02 + a32 * b03;
    out[3] = a03 * b00 + a13 * b01 + a23 * b02 + a33 * b03;
    out[4] = a00 * b10 + a10 * b11 + a20 * b12 + a30 * b13;
    out[5] = a01 * b10 + a11 * b11 + a21 * b12 + a31 * b13;
    out[6] = a02 * b10 + a12 * b11 + a22 * b12 + a32 * b13;
    out[7] = a03 * b10 + a13 * b11 + a23 * b12 + a33 * b13;
    out[8] = a00 * b20 + a10 * b21 + a20 * b22 + a30 * b23;
    out[9] = a01 * b20 + a11 * b21 + a21 * b22 + a31 * b23;
    out[10] = a02 * b20 + a12 * b21 + a22 * b22 + a32 * b23;
    out[11] = a03 * b20 + a13 * b21 + a23 * b22 + a33 * b23;
    out[12] = a00 * b30 + a10 * b31 + a20 * b32 + a30 * b33;
    out[13] = a01 * b30 + a11 * b31 + a21 * b32 + a31 * b33;
    out[14] = a02 * b30 + a12 * b31 + a22 * b32 + a32 * b33;
    out[15] = a03 * b30 + a13 * b31 + a23 * b32 + a33 * b33;
    return out;
  }

  function mat4Translation(x, y, z) {
    const out = createMat4();
    mat4Identity(out);
    out[12] = x;
    out[13] = y;
    out[14] = z;
    return out;
  }

  function mat4RotationX(rad) {
    const out = createMat4();
    const c = Math.cos(rad);
    const s = Math.sin(rad);
    mat4Identity(out);
    out[5] = c;
    out[6] = s;
    out[9] = -s;
    out[10] = c;
    return out;
  }

  function mat4RotationY(rad) {
    const out = createMat4();
    const c = Math.cos(rad);
    const s = Math.sin(rad);
    mat4Identity(out);
    out[0] = c;
    out[2] = -s;
    out[8] = s;
    out[10] = c;
    return out;
  }

  function mat4RotationZ(rad) {
    const out = createMat4();
    const c = Math.cos(rad);
    const s = Math.sin(rad);
    mat4Identity(out);
    out[0] = c;
    out[1] = s;
    out[4] = -s;
    out[5] = c;
    return out;
  }

  function mat4Scale(x, y, z) {
    const out = createMat4();
    mat4Identity(out);
    out[0] = x;
    out[5] = y;
    out[10] = z;
    return out;
  }

  function mulMany() {
    const out = createMat4();
    mat4Identity(out);
    for (let i = 0; i < arguments.length; i++) {
      mat4Multiply(out, out, arguments[i]);
    }
    return out;
  }

  function fract(v) {
    return v - Math.floor(v);
  }

  function hash(n) {
    return fract(Math.sin(n * 127.1 + 311.7) * 43758.5453123);
  }

  function easeInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function polygonRadius(theta, sides, rotation) {
    const step = Math.PI * 2 / sides;
    const local = ((theta - rotation + Math.PI) % step + step) % step - step / 2;
    return Math.cos(Math.PI / sides) / Math.cos(local);
  }

  function edgeWave(theta, sides, rotation, seed) {
    const step = Math.PI * 2 / sides;
    const raw = ((theta - rotation + Math.PI * 8) % step) / step;
    const edge = Math.abs(raw - 0.5) * 2;
    const notchA = Math.sin(raw * Math.PI * (2 + Math.floor(hash(seed) * 3)));
    const notchB = Math.sin(raw * Math.PI * (4 + Math.floor(hash(seed + 10) * 4)));
    const saw = Math.pow(1 - edge, 1.4) * 0.22;
    return saw * (0.45 + notchA * 0.35 + notchB * 0.2);
  }

  function createPrismGeometry(segments) {
    const positions = [];
    const indices = [];
    positions.push(0, 0, 0.5);
    positions.push(0, 0, -0.5);
    for (let i = 0; i < segments; i++) {
      const a = i / segments * Math.PI * 2;
      const x = Math.cos(a);
      const y = Math.sin(a);
      positions.push(x, y, 0.5);
      positions.push(x, y, -0.5);
    }
    for (let i = 0; i < segments; i++) {
      const next = (i + 1) % segments;
      const tf = 2 + i * 2;
      const tb = tf + 1;
      const nf = 2 + next * 2;
      const nb = nf + 1;
      indices.push(0, nf, tf);
      indices.push(1, tb, nb);
      indices.push(tf, nf, tb);
      indices.push(nf, nb, tb);
    }
    return {
      positions: new Float32Array(positions),
      indices: new Uint16Array(indices)
    };
  }

  function createTarget(base, sides, rotation, seed) {
    const target = new Float32Array(base.length);
    target[0] = 0;
    target[1] = 0;
    target[2] = 0.08;
    target[3] = 0;
    target[4] = 0;
    target[5] = -0.08;
    for (let i = 2; i < base.length / 3; i++) {
      const x = base[i * 3];
      const y = base[i * 3 + 1];
      const z = base[i * 3 + 2];
      const theta = Math.atan2(y, x);
      const baseRadius = polygonRadius(theta, sides, rotation);
      const wobble = 1 + Math.sin(theta * (sides * 0.5 + 1.5) + seed) * 0.035;
      const bite = edgeWave(theta, sides, rotation, seed + Math.floor(i / 2));
      const radius = baseRadius * (0.96 + bite) * wobble;
      target[i * 3] = Math.cos(theta) * radius;
      target[i * 3 + 1] = Math.sin(theta) * radius;
      target[i * 3 + 2] = z > 0 ? 0.08 : -0.08;
    }
    return target;
  }

  function createObject(color, x, seed) {
    const mesh = createPrismGeometry(128);
    const base = new Float32Array(mesh.positions.length);
    for (let i = 0; i < mesh.positions.length; i += 3) {
      base[i] = mesh.positions[i] * 0.8;
      base[i + 1] = mesh.positions[i + 1] * 0.8;
      base[i + 2] = mesh.positions[i + 2] * 0.16;
    }
    const targets = [];
    for (let sides = 3; sides <= 10; sides++) {
      targets.push(createTarget(base, sides, hash(seed + sides) * Math.PI * 2, seed + sides * 9.7));
    }
    const positions = new Float32Array(base);
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
    const indexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.indices, gl.STATIC_DRAW);
    return {
      color,
      x,
      seed,
      base,
      targets,
      positions,
      indices: mesh.indices,
      positionBuffer,
      indexBuffer,
      morphA: 1,
      morphB: 4,
      morphStart: 0,
      morphDuration: 2200 + hash(seed) * 2600,
      randomRot: [hash(seed + 1) * Math.PI * 2, hash(seed + 2) * Math.PI * 2, hash(seed + 3) * Math.PI * 2],
      randomSpin: [0.22 + hash(seed + 4) * 0.55, 0.2 + hash(seed + 5) * 0.55, 0.18 + hash(seed + 6) * 0.45],
      wobble: [0.9 + hash(seed + 7), 0.9 + hash(seed + 8), 0.9 + hash(seed + 9)]
    };
  }

  const program = createProgram(vertexSource, fragmentSource);
  gl.useProgram(program);

  const locations = {
    position: gl.getAttribLocation(program, 'aPosition'),
    projection: gl.getUniformLocation(program, 'uProjection'),
    view: gl.getUniformLocation(program, 'uView'),
    model: gl.getUniformLocation(program, 'uModel'),
    color: gl.getUniformLocation(program, 'uColor')
  };

  const objects = [
    createObject([1.0, 0.9, 0.15], -2.45, 3.1),
    createObject([1.0, 0.16, 0.72], 2.45, 8.4)
  ];

  const projection = createMat4();
  const view = createMat4();
  const eye = [0, 0, 8.6];
  const center = [0, 0, 0];
  const up = [0, 1, 0];

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const width = Math.max(1, Math.floor(window.innerWidth * dpr));
    const height = Math.max(1, Math.floor(window.innerHeight * dpr));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    gl.viewport(0, 0, width, height);
    mat4Perspective(projection, Math.PI / 3.3, width / height, 0.1, 100);
  }

  function updateMorph(object, time) {
    let phase = (time - object.morphStart) / object.morphDuration;
    if (phase >= 1) {
      object.morphStart = time;
      object.morphA = object.morphB;
      let next = Math.floor(hash(object.seed * 10 + time * 0.0004) * object.targets.length);
      if (next === object.morphA) next = (next + 1) % object.targets.length;
      object.morphB = next;
      object.morphDuration = 1800 + hash(object.seed + time * 0.001) * 3200;
      phase = 0;
    }
    const mirrored = phase < 0.5 ? phase * 2 : (1 - phase) * 2;
    const pull = easeInOut(mirrored);
    const ta = object.targets[object.morphA];
    const tb = object.targets[object.morphB];
    for (let i = 0; i < object.positions.length; i++) {
      const target = ta[i] * (1 - pull) + tb[i] * pull;
      object.positions[i] = object.base[i] * (1 - mirrored) + target * mirrored;
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, object.positionBuffer);
    gl.bufferSubData(gl.ARRAY_BUFFER, 0, object.positions);
  }

  function bindObject(object) {
    gl.bindBuffer(gl.ARRAY_BUFFER, object.positionBuffer);
    gl.enableVertexAttribArray(locations.position);
    gl.vertexAttribPointer(locations.position, 3, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, object.indexBuffer);
  }

  function draw(time) {
    resize();
    mat4LookAt(view, eye, center, up);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);
    gl.cullFace(gl.BACK);

    gl.uniformMatrix4fv(locations.projection, false, projection);
    gl.uniformMatrix4fv(locations.view, false, view);

    for (let i = 0; i < objects.length; i++) {
      const object = objects[i];
      updateMorph(object, time);
      bindObject(object);
      const t = time * 0.001;
      const rx = object.randomRot[0] + t * object.randomSpin[0] + Math.sin(t * object.wobble[0] * 1.6 + object.seed) * 0.6;
      const ry = object.randomRot[1] + t * object.randomSpin[1] + Math.cos(t * object.wobble[1] * 1.2 + object.seed * 1.7) * 0.8;
      const rz = object.randomRot[2] + t * object.randomSpin[2] + Math.sin(t * object.wobble[2] * 1.4 + object.seed * 2.3) * 0.55;
      const breathe = 1 + Math.sin(t * 2.2 + object.seed) * 0.025;
      const model = mulMany(
        mat4Translation(object.x, 0, 0),
        mat4RotationY(ry),
        mat4RotationX(rx),
        mat4RotationZ(rz),
        mat4Scale(breathe, breathe, 1 + Math.sin(t * 1.8 + object.seed) * 0.015)
      );
      gl.uniformMatrix4fv(locations.model, false, model);
      gl.uniform3fv(locations.color, new Float32Array(object.color));
      gl.drawElements(gl.TRIANGLES, object.indices.length, gl.UNSIGNED_SHORT, 0);
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
